apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers must not run as the root user (UID 0) or allow privilege
      escalation. Blocks the exact pattern in the original insecure
      ledger-api deployment.yaml.
spec:
  validationFailureAction: Enforce
  background: true
  failurePolicy: Ignore
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["payments"]
      validate:
        message: "Containers must set runAsNonRoot=true and must not run as UID 0."
        pattern:
          spec:
            =(securityContext):
              =(runAsNonRoot): "true"
            containers:
              - =(securityContext):
                  =(runAsNonRoot): "true"
                  =(runAsUser): "!0"
