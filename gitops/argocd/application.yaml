apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/dodo-devsecops.git
    targetRevision: main
    path: gitops/argocd/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true    # drift detection: removes resources deleted from git
      selfHeal: true  # drift detection: reverts manual kubectl edits
    syncOptions:
      - CreateNamespace=false # namespace is managed by task1-hardening/base itself
